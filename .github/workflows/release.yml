name: Produce release
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag'
        required: true

permissions:
  contents: write

concurrency:
  group: ${{ github.ref }}-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            gh zip tar unzip wget curl \
            gcc gcc-multilib g++-multilib \
            mingw-w64 \
            clang make

      # =========================
      # RESOURCES
      # =========================
      - name: Retrieve assets
        run: |
          wget https://www.classicube.net/static/default.zip
          wget https://www.classicube.net/static/audio.zip
      # =========================
      # LINUX BUILD
      # =========================
      - name: Build Linux
        run: |
          # =====================
          # 64-bit build
          # =====================
          rm -rf lib
          wget https://github.com/ClassiCube/rpi-compiling-stuff/raw/main/linux64.zip
          unzip linux64.zip

          gcc src/*.c third_party/bearssl/*.c -O1 -s \
            -fno-stack-protector -fno-math-errno -Qn -Werror \
            -fvisibility=hidden -rdynamic \
            -no-pie -fno-pie -m64 -L ./lib \
            -Wl,--unresolved-symbols=ignore-in-shared-libs \
            -o cc-linux-64 -lX11 -lXi -lpthread -lGL -lm -ldl

          # =====================
          # 32-bit build
          # =====================
          rm -rf lib
          wget https://github.com/ClassiCube/rpi-compiling-stuff/raw/main/linux32.zip
          unzip linux32.zip

          gcc src/*.c third_party/bearssl/*.c -O1 -s \
            -fno-stack-protector -fno-math-errno -Qn -Werror \
            -fvisibility=hidden -rdynamic \
            -no-pie -fno-pie -m32 -L ./lib \
            -Wl,--unresolved-symbols=ignore-in-shared-libs \
            -o cc-linux-32 -lX11 -lXi -lpthread -lGL -lm -ldl

      # =========================
      # WINDOWS BUILD
      # =========================
      - name: Build Windows
        run: |
          cp misc/windows/CCicon_64.res src/CCicon_64.res
          cp misc/windows/CCicon_32.res src/CCicon_32.res

          x86_64-w64-mingw32-gcc src/*.c third_party/bearssl/*.c \
            -O1 -s -mwindows -nostartfiles -Wl,-emain_real \
            -DCC_NOMAIN src/CCicon_64.res \
            -o cc-w64.exe -lwinmm -limagehlp

          i686-w64-mingw32-gcc src/*.c third_party/bearssl/*.c \
            -O1 -s -mwindows -nostartfiles -Wl,-e_main_real \
            -DCC_NOMAIN src/CCicon_32.res \
            -o cc-w32.exe -lwinmm -limagehlp

      # =========================
      # WINDOWS ARM
      # =========================
      - name: Build Windows ARM
        run: |
          docker run --rm -v $PWD:/work dockcross/windows-arm64 bash -c "
            cd /work &&
            aarch64-w64-mingw32-gcc src/*.c third_party/bearssl/*.c \
            -O1 -s -mwindows -nostartfiles -Wl,-emain_real \
            -DCC_NOMAIN \
            -o cc-warm64.exe -lwinmm -limagehlp
          "

      # =========================
      # ANDROID BUILD
      # =========================
      - name: Build Android
        run: |
          docker run --rm -v $PWD:/work ghcr.io/saschpe/android-ndk:34-jdk17.0.8_7-ndk25.2.9519653-cmake3.22.1 bash -c "
            cd /work &&
            mkdir build-tools &&
            wget https://github.com/ClassiCube/rpi-compiling-stuff/raw/main/build-tools.zip &&
            unzip build-tools.zip -d build-tools &&

            NDK_ROOT=/opt/android-sdk-linux/ndk/25.2.9519653/toolchains/llvm/prebuilt/linux-x86_64/bin &&
            SRCS='src/*.c src/android/*.c third_party/bearssl/*.c' &&

            \$NDK_ROOT/aarch64-linux-android21-clang \$SRCS -O1 -shared -fPIC \
              -o cc-android.so -lGLESv2 -lEGL -lm -llog
          "

          echo "Android APK step omitted for brevity"

      # =========================
      # PACKAGE
      # =========================
      - name: Generate builds
        run: |
          mkdir -p ClassiCube/audio ClassiCube/texpacks
          cp audio.zip ClassiCube/audio/classicube.zip
          cp default.zip ClassiCube/texpacks/classicube.zip

          make_unix_tar() {
            cp $2 ClassiCube/ClassiCube
            chmod +x ClassiCube/ClassiCube
            tar -zcvf $1 ClassiCube
            rm ClassiCube/ClassiCube
          }

          make_windows_zip() {
            cp $2 ClassiCube/ClassiCube.exe
            zip -r $1 ClassiCube
            rm ClassiCube/ClassiCube.exe
          }

          make_unix_tar cc-linux32.tar.gz cc-linux-32
          make_unix_tar cc-linux64.tar.gz cc-linux-64

          make_windows_zip cc-win32.zip cc-w32.exe
          make_windows_zip cc-win64.zip cc-w64.exe

      # =========================
      # RELEASE
      # =========================
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.event.inputs.release_tag }}" \
            --title "Release ${{ github.event.inputs.release_tag }}" \
            --notes "Automated release build"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        run: |
          for f in *.tar.gz *.zip; do
            gh release upload "${{ github.event.inputs.release_tag }}" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}